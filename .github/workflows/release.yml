name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: recast-linux-x86_64
          - os: macos-latest
            asset_name: recast-macos-arm64
          - os: windows-latest
            asset_name: recast-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ffmpeg -y
          refreshenv
        shell: cmd

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Run tests
        run: pytest --tb=short -q

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name ${{ matrix.asset_name }} --add-data "recast/static:recast/static" --add-data "recast/pipeline/prompts:recast/pipeline/prompts" --collect-submodules recast recast/__main__.py
        shell: bash

      - name: Test built binary
        run: |
          OUTPUT=$(./dist/${{ matrix.asset_name }} --help 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -i "recast\|usage\|radio"
        shell: bash
        if: runner.os != 'Windows'

      - name: Test built binary (Windows)
        run: |
          $output = & "dist\${{ matrix.asset_name }}" --help 2>&1 | Out-String
          Write-Output $output
          if ($output -notmatch "(?i)recast|usage|radio") { exit 1 }
        shell: pwsh
        if: runner.os == 'Windows'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
